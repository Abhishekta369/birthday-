<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Message</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
            font-family: Arial, sans-serif;
            color: white;
        }
        .box {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 50px;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>“I had something special, but timing matters 😌”</h1>
    </div>
</body>
</html>
